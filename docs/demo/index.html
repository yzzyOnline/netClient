<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔗%3C/text%3E%3C/svg%3E">
    <meta charset="UTF-8">
    <title>NetClient Demo Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111; color: #eee; font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 48px;
            background: #0d0d0d;
            border-bottom: 1px solid #1c1c26;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }

        .yzzy-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #00e87a;
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid rgba(0,232,122,.25);
            border-radius: 3px;
            transition: background .15s, box-shadow .15s;
        }
        .yzzy-link:hover {
            background: rgba(0,232,122,.08);
            box-shadow: 0 0 12px rgba(0,232,122,.15);
        }

        .topbar-sep {
            color: #2a2a3a;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid #333;
            border-radius: 3px;
            background: rgba(255,255,255,.04);
            transition: background .15s, color .15s, border-color .15s;
        }
        .back-link:hover { color: #fff; border-color: #555; background: rgba(255,255,255,.08); }

        .topbar-title { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #2e2e42; letter-spacing: 1.5px; }

        .topbar-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 2px;
            border: 1px solid #1c1c26;
            color: #2a2a3a;
            letter-spacing: 2px;
        }

        /* ── Content ── */
        .content { padding: 24px; }
        h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        p { font-size: 13px; color: #aaa; margin-bottom: 14px; line-height: 1.6; }
        .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        button {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 7px 14px;
            background: transparent;
            border: 1px solid #333;
            color: #ccc;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        button:hover { border-color: #00e87a; color: #00e87a; }
        input {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 7px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #eee;
            border-radius: 3px;
            width: 120px;
        }
        input::placeholder { color: #444; }
        #log {
            height: 120px;
            overflow-y: auto;
            background: #0d0d0d;
            border: 1px solid #222;
            padding: 10px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #888;
            border-radius: 4px;
            margin-bottom: 12px;
            line-height: 1.7;
        }
        canvas { background: #1a1a1a; display: block; border: 1px solid #222; border-radius: 4px; max-width: 100%; }
    </style>
</head>
<body>

<!-- ── Nav bar ── -->
<div class="topbar">
    <div class="topbar-left">
        <a class="yzzy-link" href="https://yzzy.online">← YZZY.ONLINE</a>
        <span class="topbar-sep">/</span>
        <a class="back-link" href="https://netclient.yzzy.online">← Docs</a>
        <span class="topbar-title">// NETCLIENT DEMO</span>
    </div>
    <span class="topbar-badge">LIVE DEMO</span>
</div>

<div class="content">
<h2>NetClient Demo Game</h2>
<p>Create or join a room, then move your player with arrow keys or WASD.</p>
<p style="color:#555;font-size:12px;font-family:'IBM Plex Mono',monospace;">Open in another tab or device and join your room code to see multiplayer in action.</p>

<div class="controls" style="margin-top:16px;">
    <button id="createBtn">Create Room</button>
    <button id="joinBtn">Join Room</button>
    <button id="colorBtn">Change Color</button>
    <input id="roomInput" placeholder="Room ID">
</div>

<div id="log"></div>

<canvas id="game" width="600" height="400"></canvas>
</div>

<script type="module" src="./demo.js"></script>
</body>
</html>
